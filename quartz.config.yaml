# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: hilll.dev
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: en-US
  baseUrl: hilll.dev
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#fffdfa"
        lightgray: "#d1caba"
        gray: "#9c9384"
        darkgray: "#2A354B"
        dark: "#08142C"
        secondary: "#274B75"
        tertiary: "#84a59d"
        highlight: rgba(143, 159, 169, 0.15)
        textHighlight: "#fff23688"
      darkMode:
        light: "#0c0f14"
        lightgray: "#1D232D"
        gray: "#5A657B"
        darkgray: "#d4d4d4"
        dark: "#ebebec"
        secondary: "#7188A9"
        tertiary: "#84a59d"
        highlight: rgba(143, 159, 169, 0.15)
        textHighlight: "#b3aa0288"
plugins:
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: true
      delimiters: ---
      language: yaml
    order: 5
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: created
      priority:
        - frontmatter
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: ./quartz-local/poetry
    enabled: true
    order: 25
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: true
      enableCheckbox: true
      parseTags: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 20
      display: desktop-only
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: left
      priority: 70
      display: desktop-only
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: absolute
      prettyLinks: true
      lazyLoad: false
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: ./quartz-local/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      mapFn: |
        (node) => {
          if (node.isFolder && node.data && node.children.length === 0) {
            node.isFolder = false;
          }
          return node;
        }
    layout:
      position: left
      priority: 80
  - source: github:quartz-community/graph
    enabled: true
    options:
      localGraph:
        showTags: true
      globalGraph:
        showTags: true
    layout:
      position: right
      priority: 10
      display: desktop-only
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
  - source: ./quartz-local/recent-notes-filtered
    enabled: true
    options:
      title: Recent Writing
      limit: 2
      prefix: blog/
      excludeSlug: blog/index
      excludeNoindex: true
      linkToMore: blog/
      showTags: true
      collapsible: true
      defaultCollapsed: false
    layout:
      position: left
      priority: 50
      display: desktop-only
  - source: ./quartz-local/recent-notes-filtered
    enabled: true
    options:
      title: Recent Notes
      limit: 2
      prefix: notes/
      linkToMore: notes/
      showTags: true
      collapsible: true
      defaultCollapsed: false
    layout:
      position: left
      priority: 60
      display: desktop-only
  - source: github:quartz-community/spacer
    enabled: true
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: ./quartz-local/footer
    enabled: true
    options:
      links: {}
layout:
  groups:
    toolbar:
      priority: 30
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - graph
        - backlinks
        - table-of-contents
        - tag-list
      positions:
        right: []
    tag:
      exclude:
        - graph
        - backlinks
        - table-of-contents
        - tag-list
      positions:
        right: []
