name: Maintenance

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: maintenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update_and_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Update flake lock
        run: nix flake update

      - name: Install Rust toolchain
        run: nix develop . --command rustup toolchain install --profile minimal stable --component rustfmt --component clippy --target wasm32-unknown-unknown

      - name: Update dependencies and lint
        run: nix develop . --command cargo run --locked --manifest-path tools/site/Cargo.toml -- update

      - name: Commit maintenance changes
        run: nix develop . --command cargo run --locked --manifest-path tools/site/Cargo.toml -- commit update_and_lint
