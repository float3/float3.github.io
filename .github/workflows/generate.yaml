name: Generate

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, 'generate')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal stable

      - name: Generate files
        run: cargo run --locked --manifest-path tools/site/Cargo.toml -- generate

      - name: Commit generated files
        run: cargo run --locked --manifest-path tools/site/Cargo.toml -- commit generate
